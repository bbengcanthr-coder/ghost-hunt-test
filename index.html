<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ค่ายธรรมะอาถรรพ์ - วัดศรีปัญญาธรรมาราม</title>
    <style>
        body {
            background-color: #000;
            color: #d4d4d4;
            font-family: 'Courier New', Courier, Tahoma, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* เอฟเฟกต์บรรยากาศมืดมน */
        #game-screen {
            width: 90%;
            max-width: 700px;
            background: linear-gradient(180deg, #0a0a0a 0%, #000 100%);
            border: 1px solid #444;
            padding: 30px;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.05);
            position: relative;
        }

        #status-bar {
            font-size: 0.8em;
            color: #888;
            margin-bottom: 20px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        #text-area {
            min-height: 200px;
            font-size: 1.1em;
            line-height: 1.8;
            margin-bottom: 30px;
        }

        #choices-area {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .choice-btn {
            background: none;
            border: 1px solid #555;
            color: #aaa;
            padding: 12px;
            text-align: left;
            cursor: pointer;
            transition: 0.3s;
            font-family: inherit;
        }

        .choice-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: #fff;
            color: #fff;
            padding-left: 20px;
        }

        .highlight { color: #ff3333; font-weight: bold; }
        .location { color: #cc99ff; font-style: italic; }

        /* กราฟิกสยองขวัญเล็กน้อย */
        #vignette {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 40%, black 150%);
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

<div id="vignette"></div>

<div id="game-screen">
    <div id="status-bar">
        <span>📍 <span id="loc-name">ทางเข้าวัด</span></span>
        <span>ความกลัว: <span id="fear-level">ต่ำ</span></span>
    </div>
    
    <div id="text-area">
        </div>

    <div id="choices-area">
        </div>
</div>

<script>
    const textArea = document.getElementById('text-area');
    const choicesArea = document.getElementById('choices-area');
    const locName = document.getElementById('loc-name');
    const fearLevel = document.getElementById('fear-level');

    const story = {
        start: {
            loc: "วัดศรีปัญญาธรรมาราม - เวลา 19:30 น.",
            text: "รถทัวร์ของ <span class='highlight'>ม.6 โรงเรียนปากคลองวิทยาคม</span> จอดสนิทหน้าวัดป่าลึกในขอนแก่น " +
                  "บรรยากาศรอบวัดมืดสนิท มีเพียงแสงไฟสลัวจากศาลาไม้เก่าๆ ครูบอกว่าที่นี่คือเขตอภัยทาน " +
                  "แต่เสียงนกแสกที่ร้องขึ้นตอนก้าวลงจากรถทำให้คุณรู้สึกแปลกๆ...",
            choices: [
                { text: "เดินตามกลุ่มเพื่อนเข้าศาลา", next: "sala" },
                { text: "แวะไปเข้าห้องน้ำหลังวัดก่อน", next: "toilet" }
            ]
        },
        sala: {
            loc: "ศาลาไม้หลังเก่า",
            text: "ในศาลาเงียบกริบ พระอาจารย์ยังไม่มา ระหว่างที่เพื่อนๆ นั่งสมาธิ " +
                  "คุณเหลือบไปเห็น <span class='highlight'>หุ่นขี้ผึ้งอดีตเจ้าอาวาส</span> ที่มุมห้อง " +
                  "ในความมืด... คุณสาบานได้ว่าเห็นลูกตาของหุ่นขี้ผึ้งนั้นขยับมองตามคุณ",
            choices: [
                { text: "ก้มหน้าสวดมนต์ ไม่สนใจ", next: "pray" },
                { text: "จ้องกลับไปเพื่อพิสูจน์", next: "stare" }
            ]
        },
        toilet: {
            loc: "ทางเดินไปห้องน้ำท้ายวัด",
            text: "ทางเดินแคบๆ ขนาบด้วยต้นตะเคียนขนาดใหญ่ ไฟฉายในมือเริ่มสั่น " +
                  "จู่ๆ คุณก็ได้ยินเสียง <span class='highlight'>'ครืด... ครืด...'</span> เหมือนคนลากฝีเท้าตามหลัง " +
                  "พอกดไฟฉายส่องไป กลับพบเพียงความว่างเปล่า",
            choices: [
                { text: "รีบวิ่งเข้าห้องน้ำแล้วล็อคประตู", next: "toilet_lock" },
                { text: "หันหลังวิ่งกลับไปที่ศาลา", next: "sala" }
            ]
        },
        stare: {
            loc: "หน้าหุ่นขี้ผึ้ง",
            text: "คุณจ้องเขม็งไปที่ดวงตานั้น... ทันใดนั้น ไฟในศาลาพึ่บพับดับลง! " +
                  "คุณรู้สึกถึง <span class='highlight'>ลมหายใจเย็นเฉียบ</span> ที่รดต้นคอ " +
                  "และเสียงกระซิบเบาๆ ว่า 'มาทำไม...'",
            choices: [
                { text: "ตะโกนเรียกชื่อเพื่อนข้างๆ", next: "dark_sala" },
                { text: "พยายามคลำทางหาประตูทางออก", next: "exit_run" }
            ]
        },
        toilet_lock: {
            loc: "ข้างในห้องน้ำเก่า",
            text: "คุณล็อคกลอนไม้ดังปัง! หอบหายใจแรง ทันใดนั้นมีเสียงเคาะประตู " +
                  "<span class='highlight'>ก๊อก... ก๊อก... ก๊อก...</span> " +
                  "ตามด้วยเสียงเพื่อนที่ชื่อ 'บอย' เรียกข้างนอก 'เปิดหน่อย... เราปวดหัว...'",
            choices: [
                { text: "เปิดประตูให้บอย", next: "open_door" },
                { text: "เงียบไว้ (บอยนอนอยู่บนรถนิ...)", next: "stay_quiet" }
            ]
        },
        stay_quiet: {
            loc: "ข้างในห้องน้ำเก่า",
            text: "คุณนึกขึ้นได้ว่า 'บอย' ลาป่วยไม่ได้มาค่ายครั้งนี้! " +
                  "เสียงเคาะเปลี่ยนเป็นเสียง <span class='highlight'>ข่วนประตู</span> แรงขึ้นเรื่อยๆ " +
                  "และมีของเหลวสีคล้ำไหลซึมเข้ามาใต้ช่องประตู...",
            choices: [
                { text: "ปีนช่องลมหนีออกไปข้างหลัง", next: "forest_escape" }
            ]
        },
        forest_escape: {
            loc: "ป่าหลังวัด",
            text: "คุณตะเกียกตะกายออกมาได้ แต่กลับหลงเข้ามาในดงเจดีย์เก็บอัฐิ " +
                  "แสงจันทร์ส่องให้เห็นเงาร่างสีขาวซีดนั่งยงโย่อยู่บนยอดเจดีย์หนึ่งในนั้น " +
                  "มันกำลังก้มลงมองคุณด้วยใบหน้าที่ <span class='highlight'>ไม่มีริมฝีปาก!</span>",
            choices: [
                { text: "วิ่งแบบไม่คิดชีวิตกลับไปที่รถทัวร์", next: "bus_safety" }
            ]
        },
        bus_safety: {
            loc: "หน้าประตูวัด",
            text: "คุณวิ่งมาถึงหน้าวัด พบเพื่อนๆ และครูกำลังยืนล้อมวงกัน " +
                  "ทุกคนหันมามองคุณด้วยสายตาที่ว่างเปล่า... ครูพูดขึ้นว่า " +
                  "'ไปไหนมา... <span class='highlight'>ทำไมหน้าซีดเหมือนคนตายแบบนั้นล่ะ?</span>'",
            choices: [
                { text: "จบการสำรวจ (รอดชีวิต?)", next: "start" }
            ]
        },
        // เพิ่มฉากอื่นๆ ตามต้องการ
    };

    function typeWriter(text, i, fnCallback) {
        if (i < text.length) {
            textArea.innerHTML = text.substring(0, i+1) + '<span style="color:white">|</span>';
            setTimeout(() => typeWriter(text, i + 1, fnCallback), 25);
        } else if (typeof fnCallback == 'function') {
            textArea.innerHTML = text;
            fnCallback();
        }
    }

    function showScene(sceneId) {
        const scene = story[sceneId];
        locName.innerText = scene.loc;
        choicesArea.innerHTML = '';

        typeWriter(scene.text, 0, () => {
            scene.choices.forEach(choice => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.innerText = `> ${choice.text}`;
                btn.onclick = () => {
                    updateFear(sceneId);
                    showScene(choice.next);
                };
                choicesArea.appendChild(btn);
            });
        });
    }

    function updateFear(id) {
        const levels = ["ต่ำ", "ปานกลาง", "สูง", "ขีดสุด"];
        // เพิ่มระบบสุ่มค่าความกลัวเพื่อให้ดูสมจริง
        if(id === 'stare' || id === 'stay_quiet') fearLevel.innerText = "สูง";
        else if(id === 'forest_escape') fearLevel.innerText = "ขีดสุด";
    }

    // เริ่มเกม
    showScene('start');
</script>

</body>
</html>
</script>

</body>
</html>
