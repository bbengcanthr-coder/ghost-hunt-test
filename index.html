<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ค่ายธรรมะมรณะ: วัดศรีปัญญาธรรมาราม</title>
    <style>
        :root {
            --blood-red: #660000;
            --ghost-green: #003300;
            --terminal-green: #00ff41;
        }

        body {
            background-color: #000;
            color: #d1d1d1;
            font-family: 'Sarabun', 'Courier New', serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Overlay เอฟเฟกต์ฟิล์มเก่า */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, black 150%);
            pointer-events: none;
            z-index: 10;
        }

        #game-box {
            width: 90%;
            max-width: 700px;
            height: 80vh;
            border: 1px solid #333;
            background: rgba(10, 10, 10, 0.95);
            padding: 30px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px rgba(0,0,0,1);
            position: relative;
            z-index: 5;
        }

        #header {
            font-size: 0.8em;
            color: #555;
            border-bottom: 1px solid #222;
            padding-bottom: 10px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #text-area {
            flex-grow: 1;
            font-size: 1.2em;
            line-height: 1.8;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        #choices {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .btn {
            background: transparent;
            border: 1px solid #444;
            color: #aaa;
            padding: 15px;
            cursor: pointer;
            text-align: left;
            font-size: 1em;
            transition: 0.3s;
        }

        .btn:hover {
            border-color: var(--blood-red);
            color: white;
            background: rgba(102, 0, 0, 0.1);
            padding-left: 25px;
        }

        .highlight { color: var(--blood-red); font-weight: bold; }
        
        /* สั่นเมื่อเจอผี */
        .shake {
            animation: shake 0.5s;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            50% { transform: translate(-1px, 2px) rotate(1deg); }
            100% { transform: translate(1px, 1px) rotate(0deg); }
        }
    </style>
</head>
<body>

<div class="overlay"></div>

<div id="game-box">
    <div id="header">ปากคลองวิทยาคม | บันทึกการเข้าค่าย | ภาคอีสาน</div>
    <div id="text-area"></div>
    <div id="choices"></div>
</div>

<audio id="sfx-click" src="Mouse Click 1.mp3"></audio>
<audio id="sfx-ghost" src="https://www.soundice.com/static/sound/scream.mp3"></audio>
<audio id="sfx-ambient" src="Scary Halloween Sounds (Horror Sound Effect).mp3" loop></audio>

<script>
    const textArea = document.getElementById('text-area');
    const choicesArea = document.getElementById('choices');
    const gameBox = document.getElementById('game-box');

    // ฟังก์ชันเล่นเสียง
    function playSound(id) {
        const sound = document.getElementById(id);
        if (sound) {
            sound.currentTime = 0;
            sound.play().catch(e => console.log("เสียงต้องมีการคลิกก่อนถึงจะเล่นได้"));
        }
    }

    const story = {
        start: {
            text: "เวลา 02:45 น. ณ <span class='highlight'>วัดศรีปัญญาธรรมาราม</span>... คุณคือ 'หนึ่ง' นักเรียน ม.6 โรงเรียนปากคลองวิทยาคม " +
                  "ท่ามกลางเสียงสวดมนต์ทำวัตรเช้าที่ควรจะสงบ แต่เพื่อนร่วมกุฏิ 2 คนหายตัวไป " +
                  "ทิ้งไว้เพียงรอยเท้าเปื้อนโคลนสีแดงข้นลากยาวออกไปทางป่าช้าหลังวัด...",
            choices: [
                { text: "เดินตามรอยเท้าไปเงียบๆ คนเดียว", next: "trail" },
                { text: "ปลุกเพื่อนคนอื่นที่ยังหลับอยู่", next: "wake_up" }
            ],
            sfx: "sfx-ambient"
        },
        trail: {
            text: "คุณคว้าไฟฉายเดินตามรอยไปจนถึงศาลาเก่าที่กำลังบูรณะ " +
                  "กลิ่นเหม็นเน่าเหมือนซากสัตว์ลอยมาปะทะหน้า " +
                  "ทันใดนั้น! ไฟฉายของคุณก็เริ่มกระพริบ... คุณเห็นเงาตะคุ่มนั่งยงโย่อยู่บนยอดขื่อศาลา",
            choices: [
                { text: "ส่องไฟขึ้นไปดูชัดๆ", next: "look_up" },
                { text: "แกล้งทำเป็นไม่เห็นแล้วรีบเดินเลี่ยงไปทางโบสถ์", next: "church" }
            ]
        },
        wake_up: {
            text: "คุณพยายามเขย่าตัวเพื่อนในกุฏิ แต่ทุกคนแข็งทื่อเหมือนหิน " +
                  "เมื่อพลิกตัวเพื่อนดู พบว่าที่ปากของทุกคนมี <span class='highlight'>เหรียญบาทเก่าๆ</span> อุดอยู่ " +
                  "เสียงกระซิบข้างหูดังขึ้น: 'อย่าปลุก... พวกเขากำลังเดินทาง'",
            choices: [
                { text: "วิ่งหนีออกจากกุฏิไปหาพระอาจารย์", next: "monk" },
                { text: "พยายามดึงเหรียญออกจากปากเพื่อน", next: "pull_coin" }
            ]
        },
        look_up: {
            text: "แสงไฟจับใบหน้าที่ขาวซีด ดวงตาเหลือกถลนไร้ตาดำ " +
                  "มันไม่ใช่คน! มันคือ 'ผีเปรต' ที่พยายามเอื้อมมือยาวๆ ลงมาหาคุณ " +
                  "คุณสะดุดล้มลงขยับไม่ได้!",
            choices: [
                { text: "หลับตาแล้วสวดมนต์บทที่พระเพิ่งสอน", next: "pray" },
                { text: "คลานหนีเข้าไปในใต้ถุนศาลา", next: "under_shrine" }
            ],
            shake: true
        },
        church: {
            text: "คุณเดินมาถึงหน้าโบสถ์ไม้เก่า เห็นพระอาจารย์ยืนหันหลังให้ " +
                  "แต่พระอาจารย์ดูแปลกไป... ท่านดูสูงผิดปกติ และแขนของท่านยาวจนเกือบถึงเข่า",
            choices: [
                { text: "เรียกพระอาจารย์ให้ช่วย", next: "call_monk" },
                { text: "หมอบลงในพุ่มไม้ไม่ให้ท่านเห็น", next: "hide" }
            ]
        },
        pray: {
            text: "คุณหลับตาปี๋ สวดมนต์ผิดๆ ถูกๆ " +
                  "เสียงหัวเราะแหลมเล็กดังลั่นป่าช้า... 'สวดผิดแล้วไอ้หนู...' " +
                  "เมื่อลืมตาขึ้น ทุกอย่างกลับสู่ความเงียบ แต่รอยนิ้วมือห้ากรงเล็บปรากฏชัดบนแขนของคุณ!",
            choices: [
                { text: "วิ่งกลับกุฏิโดยไม่หันหลังมอง", next: "final_run" }
            ]
        },
        final_run: {
            text: "คุณวิ่งสุดชีวิตจนถึงกุฏิ แสงอาทิตย์เริ่มรำไร " +
                  "เพื่อนๆ ทุกคนตื่นขึ้นมาทำวัตรเช้าตามปกติเหมือนไม่มีอะไรเกิดขึ้น " +
                  "ยกเว้น... รอยนิ้วมือบนแขนคุณที่ค่อยๆ เปลี่ยนเป็นสีเขียวคล้ำ และเพื่อนที่หายไป 2 คน กลับมาพร้อมรอยยิ้มที่ปากฉีกถึงใบหู",
            choices: [
                { text: "จบเหตุการณ์คืนแรก (เริ่มใหม่)", next: "start" }
            ]
        }
    };

    function renderScene(sceneKey) {
        const scene = story[sceneKey];
        
        // เล่นเสียง Effect
        if (scene.sfx) playSound(scene.sfx);
        else playSound('sfx-click');

        // สั่นหน้าจอ
        if (scene.shake) {
            gameBox.classList.add('shake');
            playSound('sfx-ghost');
            setTimeout(() => gameBox.classList.remove('shake'), 500);
        }

        // แสดงข้อความ
        textArea.innerHTML = "";
        let i = 0;
        const speed = 40; 
        
        function typeWriter() {
            if (i < scene.text.length) {
                if (scene.text.charAt(i) === '<') {
                    // หาแท็กปิด
                    let tagEnd = scene.text.indexOf('>', i);
                    textArea.innerHTML += scene.text.substring(i, tagEnd + 1);
                    i = tagEnd + 1;
                } else {
                    textArea.innerHTML += scene.text.charAt(i);
                    i++;
                }
                setTimeout(typeWriter, speed);
            } else {
                renderChoices(scene.choices);
            }
        }
        typeWriter();
    }

    function renderChoices(choices) {
        choicesArea.innerHTML = "";
        choices.forEach(c => {
            const button = document.createElement('button');
            button.className = 'btn';
            button.innerHTML = `[เลือก] ${c.text}`;
            button.onclick = () => renderScene(c.next);
            choicesArea.appendChild(button);
        });
    }

    // เริ่มเกม
    renderScene('start');

</script>
</body>
</html>
